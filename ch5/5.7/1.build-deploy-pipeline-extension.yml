workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

variables:
  DOCKER_REPOSITORY: sungminl/worklog-backend

stages:
  - init
  - test
  - build
  - deploy
  - notify

# ----- Reusable templates using extends -----

.docker-job:
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo ${DOCKERHUB_TOKEN} | docker login --username ${DOCKERHUB_USERNAME} --password-stdin

.notify-template:
  stage: notify
  image: alpine:latest
  needs:
    - init
    - build
    - deploy

# ----- Pipeline jobs -----

init:
  stage: init
  image: alpine:latest
  script:
    - echo "FULL_SHA=${CI_COMMIT_SHA}" >> build.env
    - echo "SHORT_SHA=$(echo ${CI_COMMIT_SHA} | cut -c1-8)" >> build.env
    - echo "BRANCH=${CI_COMMIT_BRANCH}" >> build.env
    - echo "COMMIT_MESSAGE=$(echo ${CI_COMMIT_MESSAGE} | head -1)" >> build.env
    - cat build.env
  artifacts:
    reports:
      dotenv: build.env

test:
  stage: test
  image: python:3.12.3-slim-bookworm
  needs:
    - init
  script:
    - echo "running test for ${FULL_SHA}"
    - pip install poetry
    - poetry install --no-root
    - export TESTING=true
    - poetry run coverage run --source ./src/worklog -m pytest --disable-warnings -v
    - poetry run coverage report

build:
  extends: .docker-job
  stage: build
  needs:
    - init
    - test
  script:
    - echo "Let's build the image for ${FULL_SHA}"
    - docker build .
        -t ${DOCKER_REPOSITORY}:${FULL_SHA}
        -t ${DOCKER_REPOSITORY}:${SHORT_SHA}
    - docker push ${DOCKER_REPOSITORY}:${SHORT_SHA}
    - docker push ${DOCKER_REPOSITORY}:${FULL_SHA}
    - echo "Tags:${SHORT_SHA}, ${FULL_SHA}"

deploy:
  stage: deploy
  image: bitnami/kubectl:latest
  needs:
    - init
    - build
  script:
    - echo "Deploying our image ${FULL_SHA} to the cluster"
    - mkdir -p ~/.kube
    - echo "${CP_K8S_CONTEXT}" > ~/.kube/config
    - kubectl apply -f deploy_manifest/worklog-backend.yaml

notify-success:
  extends: .notify-template
  script:
    - echo "Your pipeline has been completed"
    - echo "Commit Message:${COMMIT_MESSAGE}"
    - echo "Tags:${SHORT_SHA}, ${FULL_SHA}"
  rules:
    - when: on_success

notify-failure:
  extends: .notify-template
  script:
    - echo "Your pipeline has been failed"
    - echo "Commit Message:${COMMIT_MESSAGE}"
    - echo "Tags:${SHORT_SHA}, ${FULL_SHA}"
  rules:
    - when: on_failure
