workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

variables:
  DOCKER_REPOSITORY: <dockerhub_username>/worklog-backend

stages:
  - init
  - test
  - build
  - notify

# ----- Reusable templates using extends -----

.docker-job:
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
    DOCKER_CONFIG: "/tmp/docker_config"
  before_script:
    - mkdir -p ${DOCKER_CONFIG}
    - printf '%s:%s' "${DOCKERHUB_USERNAME}" "${DOCKERHUB_TOKEN}" | base64 | tr -d '\n' > /tmp/auth.txt
    - echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"$(cat /tmp/auth.txt)\"}}}" > ${DOCKER_CONFIG}/config.json

.notify-template:
  stage: notify
  image: alpine:latest
  needs:
    - init
    - build

# ----- Pipeline jobs -----

init:
  stage: init
  image: alpine:latest
  script:
    - echo "FULL_SHA=${CI_COMMIT_SHA}" >> build.env
    - echo "SHORT_SHA=$(echo ${CI_COMMIT_SHA} | cut -c1-8)" >> build.env
    - echo "BRANCH=${CI_COMMIT_BRANCH}" >> build.env
    - echo "COMMIT_MESSAGE=$(echo ${CI_COMMIT_MESSAGE} | head -1)" >> build.env
    - cat build.env
  artifacts:
    reports:
      dotenv: build.env

test:
  stage: test
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  needs:
    - init
  script:
    - echo "running test for ${FULL_SHA}"
    - uv sync --extra dev
    - export TESTING=true
    - uv run coverage run --source ./src/worklog -m pytest --disable-warnings -v
    - uv run coverage report

build:
  extends: .docker-job
  stage: build
  needs:
    - init
    - test
  script:
    - echo "Let's build the image for ${FULL_SHA}"
    - docker buildx create --use --driver docker-container 2>/dev/null || true
    - docker buildx build .
        --platform linux/amd64,linux/arm64
        -t ${DOCKER_REPOSITORY}:${FULL_SHA}
        -t ${DOCKER_REPOSITORY}:${SHORT_SHA}
        --push
    - echo "Tags:${SHORT_SHA}, ${FULL_SHA}"

notify-success:
  extends: .notify-template
  script:
    - echo "Your pipeline has been completed"
    - echo "Commit Message:${COMMIT_MESSAGE}"
    - echo "Tags:${SHORT_SHA}, ${FULL_SHA}"
  rules:
    - when: on_success

notify-failure:
  extends: .notify-template
  script:
    - echo "Your pipeline has been failed"
    - echo "Commit Message:${COMMIT_MESSAGE}"
    - echo "Tags:${SHORT_SHA}, ${FULL_SHA}"
  rules:
    - when: on_failure
