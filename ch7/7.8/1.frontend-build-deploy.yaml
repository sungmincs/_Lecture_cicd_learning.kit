name: Frontend Build and Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'deploy_manifest/**'

permissions:
  contents: write

env:
  IMAGE_NAME: worklog-frontend-mock

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Set image tag
        id: vars
        run: echo "image_tag=$(git rev-parse --short=8 HEAD)" >> $GITHUB_OUTPUT
      - name: Docker login
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
      - name: Build and push (multi-arch)
        run: |
          docker run --privileged --rm tonistiigi/binfmt --install all
          docker buildx create --use --name builder
          docker buildx build --platform linux/amd64,linux/arm64 \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.image_tag }} \
            --push .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update manifest and push
        run: |
          sed -i "s|image: .*/worklog-frontend-mock:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}|" deploy_manifest/worklog-frontend.yaml
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add deploy_manifest/
          git diff --staged --quiet || git commit -m "deploy: update frontend image to ${{ needs.build.outputs.image_tag }}"
          git pull --rebase origin main
          git push origin main
