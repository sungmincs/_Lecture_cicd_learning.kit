name: Frontend Build and Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'deploy_manifest/**'

env:
  DOCKER_REPOSITORY: <dockerhub_username>/worklog-frontend-mock

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set variables
        id: vars
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker login
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
      - name: Build and push
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ${{ env.DOCKER_REPOSITORY }}:${{ steps.vars.outputs.short_sha }} \
            --push .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update manifest and push
        run: |
          sed -i "s|image: .*worklog-frontend-mock:.*|image: ${{ env.DOCKER_REPOSITORY }}:${{ needs.build.outputs.short_sha }}|" deploy_manifest/worklog-frontend.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add deploy_manifest/
          git commit -m "deploy: update frontend image tag to ${{ needs.build.outputs.short_sha }}"
          git push origin main
