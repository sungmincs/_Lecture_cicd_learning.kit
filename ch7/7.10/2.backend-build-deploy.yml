workflow:
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[skip ci\]/'
      when: never
    - if: $CI_COMMIT_BRANCH == "main"

stages:
  - test
  - build
  - deploy

variables:
  DOCKER_REPOSITORY: worklog-backend

test:
  stage: test
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  script:
    - uv sync --extra dev
    - TESTING=true uv run coverage run --source ./src/worklog -m pytest --disable-warnings -v
    - uv run coverage report

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  needs: [test]
  before_script:
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
  script:
    - SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-8)
    - docker buildx create --use --name builder
    - docker buildx build --platform linux/amd64,linux/arm64
        -t $DOCKERHUB_USERNAME/$DOCKER_REPOSITORY:$SHORT_SHA
        --push .

deploy:
  stage: deploy
  image: alpine:latest
  needs: [build]
  before_script:
    - apk add --no-cache git
  script:
    - SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-8)
    - git config user.name "gitlab-ci"
    - git config user.email "ci@gitlab.com"
    - git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@gitlab.com/<gitlab_username>/worklog-backend.git"
    - sed -i "s|image: .*/worklog-backend:.*|image: $DOCKERHUB_USERNAME/$DOCKER_REPOSITORY:$SHORT_SHA|" deploy_manifest/worklog-backend.yaml
    - 'sed -i "s|value: .* # IMAGE_TAG|value: \"$SHORT_SHA\" # IMAGE_TAG|" deploy_manifest/worklog-backend.yaml'
    - git add deploy_manifest/
    - git diff --staged --quiet || git commit -m "deploy: update backend image to $SHORT_SHA [skip ci]"
    - git push origin HEAD:main
