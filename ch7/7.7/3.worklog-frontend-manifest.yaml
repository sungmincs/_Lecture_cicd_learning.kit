apiVersion: apps/v1
kind: Deployment
metadata:
  name: worklog-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worklog-frontend
  template:
    metadata:
      labels:
        app: worklog-frontend
    spec:
      imagePullSecrets:
      - name: dockerhub-creds
      containers:
        - name: worklog-frontend
          image: <dockerhub_username>/worklog-frontend-mock:<image_tag>
          ports:
            - containerPort: 5173
          env:
            - name: VITE_API_URL
              value: http://worklog-backend.default.svc.cluster.local:80
          livenessProbe:
            httpGet:
              path: /
              port: 5173
          readinessProbe:
            httpGet:
              path: /
              port: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: worklog-frontend
  labels:
    app: worklog-frontend
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 5173
  selector:
    app: worklog-frontend
  type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: worklog-frontend
spec:
  parentRefs:
  - name: nginx-gateway
  hostnames:
  - worklog-frontend.myk8s.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: worklog-frontend
      port: 8080
