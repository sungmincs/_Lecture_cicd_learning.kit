stages:
  - test
  - build
  - deploy

variables:
  DOCKER_REPOSITORY: <dockerhub_username>/worklog-backend
  DOCKER_CONFIG: "/tmp/docker_config"
  DOCKER_HOST: tcp://docker:2375

workflow:
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[skip ci\]/'
      when: never
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH =~ /^release\//
    - if: $CI_COMMIT_TAG =~ /^v/

test:
  stage: test
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  allow_failure: true
  script:
    - uv sync --extra dev
    - TESTING=true uv run coverage run --source ./src/worklog -m pytest --disable-warnings -v
    - uv run coverage report

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - mkdir -p "$DOCKER_CONFIG"
    - echo "$DOCKERHUB_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
    - docker buildx rm mybuilder 2>/dev/null || true
    - docker buildx create --name mybuilder --driver docker-container --use
    - |
      docker buildx build --platform linux/amd64 \
        -t $DOCKER_REPOSITORY:$CI_COMMIT_SHORT_SHA \
        --push .
    - echo "build successful: $CI_COMMIT_SHORT_SHA"

deploy:
  stage: deploy
  image: amazon/aws-cli:latest
  needs: [build]
  before_script:
    - aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME
    - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    - install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
  script:
    - sed -i "s|image: .*worklog-backend:.*|image: $DOCKER_REPOSITORY:$CI_COMMIT_SHORT_SHA|" deploy_manifest/worklog-backend.yaml
    - sed -i "s|value: .*# IMAGE_TAG|value: $CI_COMMIT_SHORT_SHA # IMAGE_TAG|" deploy_manifest/worklog-backend.yaml
    - kubectl apply -f deploy_manifest/worklog-backend.yaml
    - kubectl rollout status deployment/worklog-backend --timeout=120s
    - echo "Deploy to EKS completed for tag $CI_COMMIT_SHORT_SHA"
