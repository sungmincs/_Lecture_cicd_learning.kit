name: worklog backend EKS + Argo CD pipeline

on:
  push:
    branches:
      - main

env:
  DOCKER_REPOSITORY: <dockerhub_username>/worklog-backend
  DOCKERHUB_USERNAME: <dockerhub_username>
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  ARGOCD_APP_NAME: worklog-backend

jobs:
  init-and-test:
    runs-on: ubuntu-latest
    outputs:
      full_sha: ${{ steps.vars.outputs.full_sha }}
      short_sha: ${{ steps.vars.outputs.short_sha }}
      branch: ${{ steps.vars.outputs.branch }}
      commit_message: ${{ steps.vars.outputs.commit_message }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - id: vars
        name: init variables
        run: |
          full_sha=${{ github.sha }}
          short_sha=$(echo ${full_sha} | cut -c1-8)
          branch=$(echo ${GITHUB_REF#refs/heads/} | tr '/' '-')
          commit_message=$(git log -1 --format="*%s* by _%an_")

          echo "full_sha=${full_sha}" >> $GITHUB_OUTPUT
          echo "short_sha=${short_sha}" >> $GITHUB_OUTPUT
          echo "branch=${branch}" >> $GITHUB_OUTPUT
          echo "commit_message=${commit_message}" >> $GITHUB_OUTPUT
      - name: Notify starting
        run: |
          echo "Sending a 'start' notification for build ${{ steps.vars.outputs.short_sha }}"
      - name: Run test
        run: |
          echo "let's run a test for ${{ steps.vars.outputs.short_sha }} in ${{ steps.vars.outputs.branch }}"
          pip install poetry
          poetry install --no-root
          export TESTING=true
          poetry run coverage run --source ./src/worklog -m pytest --disable-warnings -v
          poetry run coverage report

  build:
    runs-on: ubuntu-latest
    needs: [init-and-test]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: |
          echo "Let's build the image for ${{ needs.init-and-test.outputs.full_sha }}"
          echo "The change commit message to build is '${{ needs.init-and-test.outputs.commit_message }}'"
          echo ${{ env.DOCKERHUB_TOKEN }} | docker login --username ${{ env.DOCKERHUB_USERNAME }} --password-stdin
          docker build . \
            -t ${{ env.DOCKER_REPOSITORY }}:${{ needs.init-and-test.outputs.full_sha }} \
            -t ${{ env.DOCKER_REPOSITORY }}:${{ needs.init-and-test.outputs.short_sha }}
          docker push ${{ env.DOCKER_REPOSITORY }}:${{ needs.init-and-test.outputs.short_sha }}
          docker push ${{ env.DOCKER_REPOSITORY }}:${{ needs.init-and-test.outputs.full_sha }}
          echo "build successful and published image with the following tags:"
          echo "Tags: ${{ needs.init-and-test.outputs.short_sha }}, ${{ needs.init-and-test.outputs.full_sha }}"

  deploy:
    runs-on: ubuntu-latest
    needs: [init-and-test, build]
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}
      - name: Install Argo CD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/argocd
      - name: Get Argo CD server address
        id: argocd-server
        run: |
          ARGOCD_SERVER=$(kubectl get svc argocd-server -n argocd -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "server=${ARGOCD_SERVER}" >> $GITHUB_OUTPUT
      - name: Update manifest and push
        run: |
          cd deploy_manifest
          sed -i "s|image: .*worklog-backend:.*|image: ${{ env.DOCKER_REPOSITORY }}:${{ needs.init-and-test.outputs.short_sha }}|" worklog-backend.yaml
          sed -i "s|value: .*# IMAGE_TAG|value: ${{ needs.init-and-test.outputs.short_sha }} # IMAGE_TAG|" worklog-backend.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "deploy: update image tag to ${{ needs.init-and-test.outputs.short_sha }}"
          git push origin main
      - name: Sync Argo CD Application
        run: |
          argocd login ${{ steps.argocd-server.outputs.server }} \
            --username admin \
            --password ${{ secrets.ARGOCD_ADMIN_PASSWORD }} \
            --insecure
          argocd app sync ${{ env.ARGOCD_APP_NAME }}
          argocd app wait ${{ env.ARGOCD_APP_NAME }} --health --timeout 120

  notify-success-result:
    if: ${{ success() }}
    runs-on: ubuntu-latest
    needs: [init-and-test, build, deploy]
    steps:
      - name: Slack Notification Success
        run: |
          echo "Your pipeline has been completed"
          echo "Commit Message: ${{ needs.init-and-test.outputs.commit_message }}"
          echo "Tags: ${{ needs.init-and-test.outputs.short_sha }}, ${{ needs.init-and-test.outputs.full_sha }}"

  notify-failure-result:
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    needs: [init-and-test, build, deploy]
    steps:
      - name: Slack Notification Failure
        run: |
          echo "Your pipeline has been failed"
          echo "Commit Message: ${{ needs.init-and-test.outputs.commit_message }}"
          echo "Tags: ${{ needs.init-and-test.outputs.short_sha }}, ${{ needs.init-and-test.outputs.full_sha }}"
