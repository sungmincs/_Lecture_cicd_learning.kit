stages:
  - test
  - build
  - deploy

variables:
  DOCKER_REPOSITORY: <dockerhub_username>/worklog-backend
  DOCKER_CONFIG: "/tmp/docker_config"
  DOCKER_HOST: tcp://docker:2375

.determine-environment: &determine-environment
  - |
    if [[ "$CI_COMMIT_TAG" =~ ^v ]]; then
      export TARGET_ENV=prod
      export NAMESPACE=prod
      export IMAGE_TAG="$CI_COMMIT_TAG"
      export ARGOCD_APP=worklog-backend-prod
    elif [[ "$CI_COMMIT_BRANCH" =~ ^release/ ]]; then
      export TARGET_ENV=staging
      export NAMESPACE=staging
      export IMAGE_TAG="staging-$CI_COMMIT_SHORT_SHA"
      export ARGOCD_APP=worklog-backend-staging
    elif [[ "$CI_COMMIT_BRANCH" == "develop" ]]; then
      export TARGET_ENV=dev
      export NAMESPACE=dev
      export IMAGE_TAG="dev-$CI_COMMIT_SHORT_SHA"
      export ARGOCD_APP=worklog-backend-dev
    else
      export TARGET_ENV=dev
      export NAMESPACE=dev
      export IMAGE_TAG="dev-$CI_COMMIT_SHORT_SHA"
      export ARGOCD_APP=worklog-backend-dev
    fi

workflow:
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[skip ci\]/'
      when: never
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH =~ /^release\//
    - if: $CI_COMMIT_TAG =~ /^v/

test:
  stage: test
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  allow_failure: true
  script:
    - uv sync --extra dev
    - TESTING=true uv run coverage run --source ./src/worklog -m pytest --disable-warnings -v
    - uv run coverage report

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - *determine-environment
    - mkdir -p "$DOCKER_CONFIG"
    - echo "$DOCKERHUB_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
    - docker buildx rm mybuilder 2>/dev/null || true
    - docker buildx create --name mybuilder --driver docker-container --use
    - |
      docker buildx build --platform linux/amd64,linux/arm64 \
        -t $DOCKER_REPOSITORY:$IMAGE_TAG \
        --push .
    - echo "build successful: $IMAGE_TAG"

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache git sed
  script:
    - *determine-environment
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        BRANCH="main"
      else
        BRANCH="$CI_COMMIT_BRANCH"
      fi
    - git config user.name "gitlab-ci"
    - git config user.email "gitlab-ci@myk8s.local"
    - git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@gitlab.com/<gitlab_username>/worklog-backend.git"
    - git rebase --abort 2>/dev/null || true
    - sed -i "s|image: .*worklog-backend:.*|image: $DOCKER_REPOSITORY:$IMAGE_TAG|" deploy_manifest/worklog-backend.yaml
    - 'sed -i "s|value: .* # IMAGE_TAG|value: \"$IMAGE_TAG\" # IMAGE_TAG|" deploy_manifest/worklog-backend.yaml'
    - git add deploy_manifest/
    - git diff --staged --quiet || git commit -m "deploy: update image tag to $IMAGE_TAG for $TARGET_ENV [skip ci]"
    - git pull --rebase origin $BRANCH || true
    - git push origin HEAD:$BRANCH
