apiVersion: v1
kind: Secret
metadata:
  name: worklog-backend-secret
type: Opaque
stringData:
  MONGODB_URI: "mongodb://admin:admin123@mongodb:27017/worklog?authSource=admin"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worklog-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worklog-backend
  template:
    metadata:
      labels:
        app: worklog-backend
    spec:
      containers:
        - name: worklog-backend
          image: <dockerhub_username>/worklog-backend:buildtest1
          ports:
            - containerPort: 8000
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: worklog-backend-secret
                  key: MONGODB_URI
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: worklog-backend
spec:
  selector:
    app: worklog-backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: worklog-backend
spec:
  ingressClassName: nginx
  rules:
    - host: worklog-backend.myk8s.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: worklog-backend
                port:
                  number: 8000
