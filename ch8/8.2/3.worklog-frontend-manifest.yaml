apiVersion: apps/v1
kind: Deployment
metadata:
  name: worklog-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worklog-frontend
  template:
    metadata:
      labels:
        app: worklog-frontend
    spec:
      containers:
        - name: worklog-frontend
          image: <dockerhub_username>/worklog-frontend:buildtest1
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: worklog-frontend
spec:
  selector:
    app: worklog-frontend
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: worklog-frontend
spec:
  ingressClassName: nginx
  rules:
    - host: worklog-frontend.myk8s.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: worklog-frontend
                port:
                  number: 8080
