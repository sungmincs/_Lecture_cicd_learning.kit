---
apiVersion: v1
kind: Secret
metadata:
  name: worklog-mongodb-creds
data:
  username: cm9vdA==          # root
  password: bXlwYXNzdzByZA==  # mypassw0rd
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-worklog-mongodb
  # 본 클러스터의 default StorageClass는 csi-driver-nfs (nfs.csi.k8s.io).
  # subDir 패턴은 ${pvc.metadata.namespace}/${pvc.metadata.name}으로 자동
  # 적용되므로 이전 nfs-subdir-external-provisioner용 annotation
  # (nfs.io/storage-path)은 더 이상 필요 없음.
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
  storageClassName: managed-nfs-storage
---
apiVersion: v1
kind: Service
metadata:
  name: worklog-mongodb
  labels:
    app: worklog-mongodb
spec:
  ports:
    - name: http
      port: 27017
      targetPort: 27017
  selector:
    app: worklog-mongodb
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: worklog-mongodb
  name: worklog-mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worklog-mongodb
  strategy:
    type: Recreate  # mongod.lock 충돌 방지 — 새 Pod 시작 전 기존 Pod 완전 종료
  template:
    metadata:
      labels:
        app: worklog-mongodb
    spec:
      containers:
      - image: mongo:8.0
        name: mongo
        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 5
          periodSeconds: 10
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: worklog-mongodb-creds
              key: username
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: worklog-mongodb-creds
              key: password
        volumeMounts:
        - name: "worklog-mongodb-data-dir"
          mountPath: "/data/db"
      volumes:
      - name: "worklog-mongodb-data-dir"
        persistentVolumeClaim:
          claimName: "pvc-worklog-mongodb"
