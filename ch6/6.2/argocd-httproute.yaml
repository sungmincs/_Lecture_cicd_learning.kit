# Argo CD Gateway API 설정 (Ingress → HTTPRoute 전환)
# argocd-manifest.yaml의 Ingress 대신 사용
---
# HTTPRoute: default ns에서 argocd ns의 서비스를 참조
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: default
spec:
  parentRefs:
  - name: nginx-gateway
    namespace: default
  hostnames:
  - argocd.myk8s.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: argocd-server
      namespace: argocd
      port: 80
---
# ReferenceGrant: default ns의 HTTPRoute가 argocd ns의 서비스를 참조 허용
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: argocd-from-default
  namespace: argocd
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: default
  to:
  - group: ""
    kind: Service
    name: argocd-server
