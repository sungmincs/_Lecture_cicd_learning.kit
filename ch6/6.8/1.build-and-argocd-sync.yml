variables:
  DOCKER_REPOSITORY: <dockerhub_username>/worklog-backend
  DOCKER_CONFIG: "/tmp/docker_config"
  ARGOCD_APP_NAME: worklog-backend

stages:
  - init
  - test
  - build
  - deploy
  - notify

init:
  stage: init
  image: alpine:latest
  script:
    - echo "FULL_SHA=${CI_COMMIT_SHA}" >> build.env
    - echo "SHORT_SHA=$(echo ${CI_COMMIT_SHA} | cut -c1-8)" >> build.env
    - echo "BRANCH=${CI_COMMIT_BRANCH}" >> build.env
    - echo "COMMIT_MESSAGE=$(echo ${CI_COMMIT_MESSAGE} | head -1)" >> build.env
    - cat build.env
  artifacts:
    reports:
      dotenv: build.env

test:
  stage: test
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  needs:
    - init
  script:
    - echo "running test for ${FULL_SHA}"
    - uv sync --extra dev
    - export TESTING=true
    - uv run coverage run --source ./src/worklog -m pytest --disable-warnings -v
    - uv run coverage report

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  needs:
    - init
    - test
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - mkdir -p ${DOCKER_CONFIG}
    - printf '%s:%s' "${DOCKERHUB_USERNAME}" "${DOCKERHUB_TOKEN}" | base64 | tr -d '\n' > /tmp/auth.txt
    - echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"$(cat /tmp/auth.txt)\"}}}" > ${DOCKER_CONFIG}/config.json
    - echo "Let's build the image for ${FULL_SHA}"
    - docker buildx create --name mybuilder --driver docker-container --use
    - docker buildx build .
        --platform linux/amd64,linux/arm64
        -t ${DOCKER_REPOSITORY}:${FULL_SHA}
        -t ${DOCKER_REPOSITORY}:${SHORT_SHA}
        --push
    - echo "Tags:${SHORT_SHA}, ${FULL_SHA}"

deploy:
  stage: deploy
  image: alpine:latest
  needs:
    - init
    - build
  before_script:
    - apk add --no-cache git openssh-client
  script:
    - |
      echo "Updating deploy manifest with new image tag ${SHORT_SHA}"
      git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      sed -i "s|image: .*worklog-backend:.*|image: ${DOCKER_REPOSITORY}:${SHORT_SHA}|" deploy_manifest/worklog-backend.yaml
      sed -i "s|value: .* # IMAGE_TAG|value: ${SHORT_SHA} # IMAGE_TAG|" deploy_manifest/worklog-backend.yaml
      git config user.name "gitlab-ci"
      git config user.email "gitlab-ci@myk8s.local"
      git add deploy_manifest/
      git commit -m "deploy: update image tag to ${SHORT_SHA} [skip ci]"
      git push origin HEAD:main

notify-success:
  stage: notify
  needs:
    - init
    - build
    - deploy
  script:
    - echo "Your pipeline has been completed"
    - echo "Commit Message:${COMMIT_MESSAGE}"
    - echo "Tags:${SHORT_SHA}, ${FULL_SHA}"
  rules:
    - when: on_success

notify-failure:
  stage: notify
  needs:
    - init
    - build
    - deploy
  script:
    - echo "Your pipeline has been failed"
    - echo "Commit Message:${COMMIT_MESSAGE}"
    - echo "Tags:${SHORT_SHA}, ${FULL_SHA}"
  rules:
    - when: on_failure
