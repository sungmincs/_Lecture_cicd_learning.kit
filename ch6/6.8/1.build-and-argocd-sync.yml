stages:
  - init
  - test
  - build
  - deploy
  - notify

variables:
  DOCKER_REPOSITORY: <dockerhub_username>/worklog-backend
  ARGOCD_SERVER: argocd.myk8s.local
  ARGOCD_APP_NAME: worklog-backend

init-variables:
  stage: init
  script:
    - export FULL_SHA=${CI_COMMIT_SHA}
    - export SHORT_SHA=$(echo ${CI_COMMIT_SHA} | cut -c1-8)
    - export BRANCH=${CI_COMMIT_REF_NAME}
    - export COMMIT_MESSAGE=$(git log -1 --format="*%s* by _%an_")
    - echo "FULL_SHA=${FULL_SHA}" >> variables.env
    - echo "SHORT_SHA=${SHORT_SHA}" >> variables.env
    - echo "BRANCH=${BRANCH}" >> variables.env
    - echo "COMMIT_MESSAGE=${COMMIT_MESSAGE}" >> variables.env
  artifacts:
    reports:
      dotenv: variables.env

run-test:
  stage: test
  image: python:3.12.3-slim-bookworm
  needs: [init-variables]
  script:
    - echo "let's run a test for ${SHORT_SHA} in ${BRANCH}"
    - echo "running test for ${FULL_SHA}"
    - pip install poetry
    - poetry install --no-root
    - export TESTING=true
    - poetry run coverage run --source ./src/worklog -m pytest --disable-warnings -v
    - poetry run coverage report

build-image:
  stage: build
  needs: [init-variables, run-test]
  script:
    - echo "Let's build the image for ${FULL_SHA}"
    - echo "The change commit message to build is '${COMMIT_MESSAGE}'"
    - echo ${DOCKERHUB_TOKEN} | docker login --username ${DOCKERHUB_USERNAME} --password-stdin
    - docker build .
        -t ${DOCKER_REPOSITORY}:${FULL_SHA}
        -t ${DOCKER_REPOSITORY}:${SHORT_SHA}
    - docker push ${DOCKER_REPOSITORY}:${SHORT_SHA}
    - docker push ${DOCKER_REPOSITORY}:${FULL_SHA}
    - echo "build successful and published image with the following tags:"
    - echo "Tags: ${SHORT_SHA}, ${FULL_SHA}"

deploy-argocd:
  stage: deploy
  image: alpine:latest
  needs: [init-variables, build-image]
  before_script:
    - apk add --no-cache curl git openssh-client
    - curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
    - chmod +x /usr/local/bin/argocd
  script:
    - echo "Updating deploy manifest with new image tag ${SHORT_SHA}"
    - cd deploy_manifest
    - sed -i "s|image:.*worklog-backend:.*|image: ${DOCKER_REPOSITORY}:${SHORT_SHA}|" worklog-backend.yaml
    - sed -i "s|value:.*# IMAGE_TAG|value: ${SHORT_SHA} # IMAGE_TAG|" worklog-backend.yaml
    - git config user.name "gitlab-ci"
    - git config user.email "gitlab-ci@myk8s.local"
    - git add .
    - git commit -m "deploy: update image tag to ${SHORT_SHA}"
    - git push origin main
    - echo "Syncing Argo CD application ${ARGOCD_APP_NAME}"
    - argocd login ${ARGOCD_SERVER}
        --username admin
        --password ${ARGOCD_ADMIN_PASSWORD}
        --insecure
    - argocd app sync ${ARGOCD_APP_NAME}
    - argocd app wait ${ARGOCD_APP_NAME} --health --timeout 120
    - echo "Argo CD sync completed successfully"

notify-success:
  stage: notify
  needs: [init-variables, build-image, deploy-argocd]
  script:
    - echo "Your pipeline has been completed"
    - echo "Commit Message: ${COMMIT_MESSAGE}"
    - echo "Tags: ${SHORT_SHA}, ${FULL_SHA}"
  when: on_success

notify-failure:
  stage: notify
  needs: [init-variables, build-image, deploy-argocd]
  script:
    - echo "Your pipeline has been failed"
    - echo "Commit Message: ${COMMIT_MESSAGE}"
    - echo "Tags: ${SHORT_SHA}, ${FULL_SHA}"
  when: on_failure
