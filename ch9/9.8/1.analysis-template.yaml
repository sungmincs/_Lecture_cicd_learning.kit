apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
spec:
  args:
    - name: service-name
  metrics:
    - name: success-rate
      interval: 30s
      successCondition: result[0] >= 0.95
      failureLimit: 3
      provider:
        web:
          url: "http://{{args.service-name}}.default.svc.cluster.local/health"
          jsonPath: "{$.status}"
          timeoutSeconds: 10
