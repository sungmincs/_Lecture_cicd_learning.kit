stages:
  - test
  - build
  - deploy

variables:
  DOCKER_REPOSITORY: worklog-backend

.determine-environment: &determine-environment
  - |
    if [[ -n "$CI_COMMIT_TAG" && "$CI_COMMIT_TAG" =~ ^v ]]; then
      export TARGET_ENV=prod
      export TARGET_NAMESPACE=prod
    elif [[ "$CI_COMMIT_BRANCH" =~ ^release/ ]]; then
      export TARGET_ENV=staging
      export TARGET_NAMESPACE=staging
    else
      export TARGET_ENV=dev
      export TARGET_NAMESPACE=dev
    fi
    echo "Deploying to $TARGET_ENV (namespace: $TARGET_NAMESPACE)"

workflow:
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH =~ /^release\//
    - if: $CI_COMMIT_TAG =~ /^v/

test:
  stage: test
  image: python:3.12.3-slim-bookworm
  script:
    - pip install poetry
    - poetry install
    - poetry run pytest

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  needs: [test]
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
  script:
    - SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
    - docker build -t $DOCKERHUB_USERNAME/$DOCKER_REPOSITORY:$SHORT_SHA .
    - docker push $DOCKERHUB_USERNAME/$DOCKER_REPOSITORY:$SHORT_SHA

deploy:
  stage: deploy
  image: bitnami/kubectl:latest
  needs: [build]
  before_script:
    - mkdir -p $HOME/.kube
    - echo "$KUBE_CONFIG" | base64 -d > $HOME/.kube/config
    - *determine-environment
  script:
    - SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
    - |
      kubectl set image deployment/worklog-backend \
        worklog-backend=$DOCKERHUB_USERNAME/$DOCKER_REPOSITORY:$SHORT_SHA \
        -n $TARGET_NAMESPACE
