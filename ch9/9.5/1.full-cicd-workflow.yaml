name: Full CI/CD Workflow (Argo CD)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop, 'release/*']
    tags: ['v*']

env:
  DOCKER_REPOSITORY: <dockerhub_username>/worklog-backend
  DOCKERHUB_USERNAME: <dockerhub_username>
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  ARGOCD_SERVER: argocd.myk8s.local

jobs:
  determine-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      namespace: ${{ steps.set-env.outputs.namespace }}
      image_tag: ${{ steps.set-env.outputs.image_tag }}
      argocd_app: ${{ steps.set-env.outputs.argocd_app }}
    steps:
      - name: Determine target environment
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "namespace=dev" >> $GITHUB_OUTPUT
            echo "image_tag=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "argocd_app=worklog-backend-dev" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/heads/develop ]]; then
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "namespace=dev" >> $GITHUB_OUTPUT
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
            echo "image_tag=dev-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "argocd_app=worklog-backend-dev" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "namespace=staging" >> $GITHUB_OUTPUT
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
            echo "image_tag=staging-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "argocd_app=worklog-backend-staging" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "namespace=prod" >> $GITHUB_OUTPUT
            TAG=${GITHUB_REF#refs/tags/}
            echo "image_tag=${TAG}" >> $GITHUB_OUTPUT
            echo "argocd_app=worklog-backend-prod" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "namespace=dev" >> $GITHUB_OUTPUT
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
            echo "image_tag=dev-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "argocd_app=worklog-backend-dev" >> $GITHUB_OUTPUT
          fi

  init-and-test:
    runs-on: ubuntu-latest
    outputs:
      full_sha: ${{ steps.vars.outputs.full_sha }}
      short_sha: ${{ steps.vars.outputs.short_sha }}
      commit_message: ${{ steps.vars.outputs.commit_message }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - id: vars
        name: Init variables
        run: |
          full_sha=${{ github.sha }}
          short_sha=$(echo ${full_sha} | cut -c1-8)
          commit_message=$(git log -1 --format="*%s* by _%an_")
          echo "full_sha=${full_sha}" >> $GITHUB_OUTPUT
          echo "short_sha=${short_sha}" >> $GITHUB_OUTPUT
          echo "commit_message=${commit_message}" >> $GITHUB_OUTPUT
      - name: Run test
        run: |
          pip install poetry
          poetry install --no-root
          export TESTING=true
          poetry run coverage run --source ./src/worklog -m pytest --disable-warnings -v
          poetry run coverage report

  build:
    runs-on: ubuntu-latest
    needs: [determine-environment, init-and-test]
    steps:
      - uses: actions/checkout@v4
      - name: Docker login
        run: |
          echo ${{ env.DOCKERHUB_TOKEN }} | docker login --username ${{ env.DOCKERHUB_USERNAME }} --password-stdin
      - name: Build and push
        run: |
          IMAGE_TAG=${{ needs.determine-environment.outputs.image_tag }}
          docker build . \
            -t ${{ env.DOCKER_REPOSITORY }}:${IMAGE_TAG} \
            -t ${{ env.DOCKER_REPOSITORY }}:${{ needs.init-and-test.outputs.short_sha }}
          docker push ${{ env.DOCKER_REPOSITORY }}:${IMAGE_TAG}
          docker push ${{ env.DOCKER_REPOSITORY }}:${{ needs.init-and-test.outputs.short_sha }}
          echo "build successful: ${IMAGE_TAG}, ${{ needs.init-and-test.outputs.short_sha }}"

  update-manifest:
    runs-on: ubuntu-latest
    needs: [determine-environment, init-and-test, build]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update manifest with new image tag
        run: |
          IMAGE_TAG=${{ needs.determine-environment.outputs.image_tag }}
          NAMESPACE=${{ needs.determine-environment.outputs.namespace }}

          cd deploy_manifest
          sed -i "s|image: .*worklog-backend:.*|image: ${{ env.DOCKER_REPOSITORY }}:${IMAGE_TAG}|" worklog-backend.yaml
          sed -i "s|value: .*# IMAGE_TAG|value: ${IMAGE_TAG} # IMAGE_TAG|" worklog-backend.yaml

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "deploy: update image tag to ${IMAGE_TAG} for ${NAMESPACE}"
          git push origin HEAD

  deploy-argocd:
    runs-on: ubuntu-latest
    needs: [determine-environment, build, update-manifest]
    environment: ${{ needs.determine-environment.outputs.environment }}
    steps:
      - name: Install Argo CD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/argocd
      - name: Sync Argo CD Application
        run: |
          ARGOCD_APP=${{ needs.determine-environment.outputs.argocd_app }}

          argocd login ${{ env.ARGOCD_SERVER }} \
            --username admin \
            --password ${{ secrets.ARGOCD_ADMIN_PASSWORD }} \
            --insecure

          argocd app sync ${ARGOCD_APP}
          argocd app wait ${ARGOCD_APP} --health --timeout 120

          echo "Argo CD sync completed for ${ARGOCD_APP}"

  notify-success-result:
    if: ${{ success() }}
    runs-on: ubuntu-latest
    needs: [determine-environment, init-and-test, build, deploy-argocd]
    steps:
      - name: Notification Success
        run: |
          echo "Full CI/CD pipeline completed successfully"
          echo "Environment: ${{ needs.determine-environment.outputs.environment }}"
          echo "Namespace: ${{ needs.determine-environment.outputs.namespace }}"
          echo "Image Tag: ${{ needs.determine-environment.outputs.image_tag }}"
          echo "Argo CD App: ${{ needs.determine-environment.outputs.argocd_app }}"
          echo "Commit: ${{ needs.init-and-test.outputs.commit_message }}"

  notify-failure-result:
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    needs: [determine-environment, init-and-test, build, deploy-argocd]
    steps:
      - name: Notification Failure
        run: |
          echo "Full CI/CD pipeline failed"
          echo "Environment: ${{ needs.determine-environment.outputs.environment }}"
          echo "Namespace: ${{ needs.determine-environment.outputs.namespace }}"
          echo "Image Tag: ${{ needs.determine-environment.outputs.image_tag }}"
          echo "Commit: ${{ needs.init-and-test.outputs.commit_message }}"
