stages:
  - lint
  - build
  - deploy

variables:
  DOCKER_REPOSITORY: <dockerhub_username>/worklog-backend
  DOCKER_CONFIG: "/tmp/docker_config"
  DOCKER_HOST: tcp://docker:2375

.determine-environment: &determine-environment
  - |
    if [[ "$CI_COMMIT_TAG" =~ ^v ]]; then
      export TARGET_ENV=prod
      export ARGOCD_APP=worklog-backend-prod
    elif [[ "$CI_COMMIT_BRANCH" =~ ^release/ ]]; then
      export TARGET_ENV=staging
      export ARGOCD_APP=worklog-backend-staging
    else
      export TARGET_ENV=dev
      export ARGOCD_APP=worklog-backend-dev
    fi

workflow:
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[skip ci\]/'
      when: never
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH =~ /^release\//
    - if: $CI_COMMIT_TAG =~ /^v/

lint:
  stage: lint
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  script:
    - uv sync --extra dev
    - uv run ruff check src/

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    SHORT_SHA: $CI_COMMIT_SHORT_SHA
  script:
    - *determine-environment
    - mkdir -p "$DOCKER_CONFIG"
    - echo "$DOCKERHUB_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
    - docker buildx rm mybuilder 2>/dev/null || true
    - docker buildx create --name mybuilder --driver docker-container --use
    - |
      docker buildx build --platform linux/amd64,linux/arm64 \
        -t $DOCKER_REPOSITORY:$SHORT_SHA \
        --push .

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache git sed
  script:
    - *determine-environment
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        BRANCH="main"
      else
        BRANCH="$CI_COMMIT_BRANCH"
      fi
    - SHORT_SHA=$CI_COMMIT_SHORT_SHA
    - git config user.name "gitlab-ci"
    - git config user.email "gitlab-ci@myk8s.local"
    - git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@gitlab.com/<gitlab_username>/worklog-backend.git"
    - git rebase --abort 2>/dev/null || true
    - sed -i "s|image: .*worklog-backend:.*|image: $DOCKER_REPOSITORY:$SHORT_SHA|" deploy_manifest/worklog-backend.yaml
    - git add deploy_manifest/
    - git diff --staged --quiet || git commit -m "deploy: update image tag to $SHORT_SHA for $TARGET_ENV [skip ci]"
    - git pull --rebase origin $BRANCH || true
    - git push origin HEAD:$BRANCH
