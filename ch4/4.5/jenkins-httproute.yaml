apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jenkins
  namespace: default
spec:
  parentRefs:
  - name: nginx-gateway
  hostnames:
  - jenkins.myk8s.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: jenkins
      port: 8080
